name: Terraform

on:
  push:
    branches: [master]
    paths: ['terraform/**']
  pull_request:
    branches: [master]
    paths: ['terraform/**']
  workflow_dispatch:

concurrency:
  group: terraform-xomtracks-infrastructure
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  TF_DIR: terraform
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.5.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        # Tee to disk so the comment step can read it without stuffing the
        # whole plan into argv/env (Linux ARG_MAX = 128KB combined; large
        # plans blow past that).
        run: terraform plan -no-color -input=false -lock=false 2>&1 | tee /tmp/tf-plan.txt
        continue-on-error: true
        env:
          # Empty if the repo secret isn't set yet -- fine for a plan-only
          # review checkpoint (SSM params get created with placeholder
          # values); Dom needs to set the real secrets before `apply`
          # actually persists usable credentials. Matches
          # meals-infrastructure's TF_VAR_api_secret_key convention.
          TF_VAR_spotify_client_id: ${{ secrets.XOMTRACKS_SPOTIFY_CLIENT_ID }}
          TF_VAR_spotify_client_secret: ${{ secrets.XOMTRACKS_SPOTIFY_CLIENT_SECRET }}
          TF_VAR_soundcloud_client_id: ${{ secrets.XOMTRACKS_SOUNDCLOUD_CLIENT_ID }}
          TF_VAR_ingest_bearer_key: ${{ secrets.XOMTRACKS_INGEST_BEARER_KEY }}
          TF_VAR_api_secret_key: ${{ secrets.XOMTRACKS_API_SECRET_KEY }}

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const raw = fs.existsSync('/tmp/tf-plan.txt')
              ? fs.readFileSync('/tmp/tf-plan.txt', 'utf8')
              : 'No output';
            const truncated = raw.length > 60000
              ? raw.substring(0, 60000) + '\n... truncated'
              : raw;
            const body = '## Terraform Plan\n```\n' + truncated + '\n```';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_spotify_client_id: ${{ secrets.XOMTRACKS_SPOTIFY_CLIENT_ID }}
          TF_VAR_spotify_client_secret: ${{ secrets.XOMTRACKS_SPOTIFY_CLIENT_SECRET }}
          TF_VAR_soundcloud_client_id: ${{ secrets.XOMTRACKS_SOUNDCLOUD_CLIENT_ID }}
          TF_VAR_ingest_bearer_key: ${{ secrets.XOMTRACKS_INGEST_BEARER_KEY }}
          TF_VAR_api_secret_key: ${{ secrets.XOMTRACKS_API_SECRET_KEY }}
